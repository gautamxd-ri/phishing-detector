<div class="checker-container">

  <div class="input-area">
    <textarea
      [(ngModel)]="smsText"
      placeholder="Paste the SMS message here...

Example:
URGENT: Your SBI account is locked!
Verify now: http://sbi-verify.fake.com
Reply with OTP to unlock."
      class="input-field"
      rows="6">
    </textarea>
  </div>

  <div class="btn-row">
    <button
      class="analyze-btn"
      (click)="analyze()"
      [disabled]="loading || !smsText.trim()">
      {{ loading ? 'Analyzing...' : 'Scan SMS' }}
    </button>
    <button
      class="clear-btn"
      (click)="clear()"
      [disabled]="loading">
      Clear
    </button>
  </div>

  <div *ngIf="loading" class="loading">
    Scanning SMS with AI...
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <app-result-card [result]="result"></app-result-card>

</div>
